name: Build Smart Stores Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: windows-latest    # GitHub's free Windows VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app (Vite)
        run: npm run build

      - name: Build Electron .exe (electron-builder)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStores-Windows-EXE
          path: release/*.exe
          retention-days: 30
